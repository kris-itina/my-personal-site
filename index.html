            margin: 0;
        }
        .card {
            background-color: white;

            border-radius: 20px;

        img {
            width: 150px;

            color: #333;
            margin-bottom: 5px;
        }
        .id {
            color: #666;
            font-size: 18px;
            margin-top: 0;
        }
        .desc {
            color: #555;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
